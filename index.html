<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CC Release Defect Portal</title>
<style>
/* ---------- Reset & Variables ---------- */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f5f6fa;
  --surface: #ffffff;
  --border: #e1e4e8;
  --text: #24292e;
  --text-muted: #586069;
  --primary: #5243aa;
  --primary-light: #ede7f6;
  --danger: #d32f2f;
  --warning: #f57c00;
  --success: #2e7d32;
  --info: #1565c0;
  --radius: 8px;
  --shadow: 0 1px 3px rgba(0,0,0,.08);
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  padding: 0;
}

/* ---------- Header ---------- */
.header {
  background: linear-gradient(135deg, #5243aa 0%, #7c4dff 100%);
  color: #fff;
  padding: 24px 32px 16px;
}
.header h1 { font-size: 24px; font-weight: 700; }
.header .subtitle { font-size: 13px; opacity: .8; margin-top: 4px; }

/* ---------- Stats cards ---------- */
.stats-bar {
  display: flex;
  gap: 16px;
  padding: 16px 32px;
  flex-wrap: wrap;
}
.stat-card {
  background: var(--surface);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 16px 24px;
  min-width: 140px;
  flex: 1;
  text-align: center;
}
.stat-card .stat-value { font-size: 32px; font-weight: 700; }
.stat-card .stat-label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .5px; }
.stat-card.total .stat-value { color: var(--primary); }
.stat-card.backlog .stat-value { color: #757575; }
.stat-card.in-progress .stat-value { color: var(--info); }
.stat-card.blocked .stat-value { color: var(--danger); }
.stat-card.in-validation .stat-value { color: var(--warning); }
.stat-card.done .stat-value { color: var(--success); }

/* ---------- Controls ---------- */
.controls {
  padding: 12px 32px;
  display: flex;
  gap: 12px;
  align-items: center;
  flex-wrap: wrap;
}
.bucket-tabs {
  display: flex;
  gap: 4px;
  background: var(--surface);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 4px;
}
.bucket-tab {
  padding: 8px 16px;
  border-radius: 6px;
  border: none;
  background: transparent;
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-muted);
  transition: all .15s;
}
.bucket-tab:hover { background: var(--primary-light); color: var(--primary); }
.bucket-tab.active { background: var(--primary); color: #fff; }
.bucket-tab .badge {
  display: inline-block;
  background: rgba(255,255,255,.25);
  border-radius: 10px;
  padding: 1px 7px;
  font-size: 11px;
  margin-left: 6px;
}
.bucket-tab.active .badge { background: rgba(255,255,255,.3); }
.bucket-tab:not(.active) .badge { background: #e0e0e0; color: #555; }

.spacer { flex: 1; }

.export-btn {
  padding: 8px 18px;
  border-radius: var(--radius);
  border: 2px solid var(--primary);
  background: var(--surface);
  color: var(--primary);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all .15s;
}
.export-btn:hover { background: var(--primary); color: #fff; }

.refresh-info {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  color: var(--text-muted);
  background: var(--surface);
  border-radius: var(--radius);
  padding: 6px 14px;
  box-shadow: var(--shadow);
}
.refresh-info .refresh-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--success);
  flex-shrink: 0;
}
.refresh-info a {
  color: var(--primary);
  text-decoration: none;
  font-weight: 500;
}
.refresh-info a:hover { text-decoration: underline; }
.refresh-btn {
  padding: 8px 18px;
  border-radius: var(--radius);
  border: 2px solid #2e7d32;
  background: var(--surface);
  color: #2e7d32;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all .15s;
  display: flex;
  align-items: center;
  gap: 6px;
}
.refresh-btn:hover { background: #2e7d32; color: #fff; }
.refresh-btn:disabled { opacity: .5; cursor: not-allowed; }
.refresh-btn .spinner {
  display: none;
  width: 14px; height: 14px;
  border: 2px solid currentColor;
  border-top-color: transparent;
  border-radius: 50%;
  animation: spin .6s linear infinite;
}
.refresh-btn.loading .spinner { display: inline-block; }
.refresh-btn.loading .refresh-icon { display: none; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ---------- Section ---------- */
.section {
  padding: 0 32px 24px;
}
.section-title {
  font-size: 16px;
  font-weight: 700;
  margin: 20px 0 8px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-title .count {
  background: var(--primary-light);
  color: var(--primary);
  border-radius: 10px;
  padding: 2px 10px;
  font-size: 12px;
}

/* ---------- Filter chips ---------- */
.filter-chips {
  display: flex;
  gap: 6px;
  margin-bottom: 12px;
  flex-wrap: wrap;
}
.chip {
  padding: 5px 14px;
  border-radius: 16px;
  border: 1.5px solid var(--border);
  background: var(--surface);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: all .15s;
  user-select: none;
}
.chip:hover { border-color: var(--primary); color: var(--primary); }
.chip.active { background: var(--primary); color: #fff; border-color: var(--primary); }
.chip .chip-count { margin-left: 4px; opacity: .7; }

/* ---------- Table ---------- */
.table-wrap {
  background: var(--surface);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
}
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
thead th {
  background: #fafbfc;
  border-bottom: 2px solid var(--border);
  padding: 10px 14px;
  text-align: left;
  font-weight: 600;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: .5px;
  color: var(--text-muted);
  white-space: nowrap;
  cursor: pointer;
  user-select: none;
}
thead th:hover { color: var(--primary); }
thead th .sort-arrow { margin-left: 4px; font-size: 10px; }
tbody tr { border-bottom: 1px solid var(--border); }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: #f8f9ff; }
td { padding: 10px 14px; vertical-align: middle; }
td.key-col a {
  color: var(--primary);
  text-decoration: none;
  font-weight: 600;
  font-family: SFMono-Regular, Menlo, monospace;
  font-size: 12px;
}
td.key-col a:hover { text-decoration: underline; }
td.summary-col {
  max-width: 400px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
td.summary-col .summary-text { cursor: help; }

/* ---------- Badges ---------- */
.badge {
  display: inline-block;
  padding: 2px 10px;
  border-radius: 12px;
  font-size: 11px;
  font-weight: 600;
  white-space: nowrap;
}
.badge-priority-highest { background: #ffebee; color: #c62828; }
.badge-priority-high { background: #fff3e0; color: #e65100; }
.badge-priority-medium { background: #fff9c4; color: #f57f17; }
.badge-priority-low { background: #e3f2fd; color: #1565c0; }
.badge-priority-lowest { background: #f5f5f5; color: #757575; }

.badge-status-backlog { background: #eeeeee; color: #616161; }
.badge-status-inprogress { background: #e3f2fd; color: #1565c0; }
.badge-status-blocked { background: #ffebee; color: #c62828; }
.badge-status-invalidation { background: #fff3e0; color: #e65100; }
.badge-status-done { background: #e8f5e9; color: #2e7d32; }

.badge-urgency { background: #fce4ec; color: #c62828; font-size: 10px; margin-left: 6px; }

/* ---------- Empty state ---------- */
.empty-state {
  text-align: center;
  padding: 40px;
  color: var(--text-muted);
  font-size: 14px;
}

/* ---------- Tooltip ---------- */
.tooltip-wrap { position: relative; }
.tooltip-content {
  display: none;
  position: absolute;
  bottom: 100%;
  left: 0;
  background: #1a1a2e;
  color: #eee;
  padding: 10px 14px;
  border-radius: 6px;
  font-size: 12px;
  line-height: 1.5;
  max-width: 400px;
  white-space: pre-wrap;
  z-index: 1000;
  box-shadow: 0 4px 12px rgba(0,0,0,.25);
}
.tooltip-wrap:hover .tooltip-content { display: block; }

/* ---------- Search ---------- */
.search-box {
  padding: 8px 14px;
  border-radius: var(--radius);
  border: 1.5px solid var(--border);
  font-size: 13px;
  width: 240px;
  transition: border-color .15s;
}
.search-box:focus { outline: none; border-color: var(--primary); }

/* ---------- Export Modal ---------- */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.5);
  z-index: 9999;
  justify-content: center;
  align-items: center;
}
.modal-overlay.show { display: flex; }
.modal {
  background: var(--surface);
  border-radius: 12px;
  padding: 32px;
  max-width: 500px;
  width: 90%;
  box-shadow: 0 8px 32px rgba(0,0,0,.2);
}
.modal h2 { margin-bottom: 16px; font-size: 18px; }
.modal p { color: var(--text-muted); font-size: 14px; margin-bottom: 20px; }
.modal-actions { display: flex; gap: 12px; justify-content: flex-end; }
.modal-btn {
  padding: 8px 20px;
  border-radius: var(--radius);
  border: none;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
}
.modal-btn.primary { background: var(--primary); color: #fff; }
.modal-btn.secondary { background: #eee; color: var(--text); }

/* ---------- Slide Preview ---------- */
.slide-preview {
  background: #f0f0f0;
  border-radius: 8px;
  padding: 20px;
  margin-bottom: 20px;
  font-size: 12px;
  max-height: 300px;
  overflow-y: auto;
}
.slide-preview .slide {
  background: #fff;
  border-radius: 4px;
  padding: 16px;
  margin-bottom: 12px;
  box-shadow: 0 1px 4px rgba(0,0,0,.1);
}
.slide-preview .slide-title {
  font-weight: 700;
  font-size: 13px;
  margin-bottom: 6px;
  color: var(--primary);
}

/* ---------- Responsive ---------- */
@media (max-width: 768px) {
  .header, .stats-bar, .controls, .section { padding-left: 16px; padding-right: 16px; }
  .stats-bar { gap: 8px; }
  .stat-card { min-width: 100px; padding: 12px 16px; }
  .stat-card .stat-value { font-size: 24px; }
  td.summary-col { max-width: 200px; }
  .search-box { width: 160px; }
}
</style>
</head>
<body>

<!-- ===== Header ===== -->
<div class="header">
  <h1>CC Release Defect Portal</h1>
  <div class="subtitle">Last refreshed: <span id="refreshedAt"></span></div>
</div>

<!-- ===== Stats ===== -->
<div class="stats-bar" id="statsBar"></div>

<!-- ===== Controls ===== -->
<div class="controls">
  <div class="bucket-tabs" id="bucketTabs"></div>
  <div class="spacer"></div>
  <input type="text" class="search-box" id="searchBox" placeholder="Search tickets...">
  <div class="refresh-info" id="refreshInfo">
    <span class="refresh-dot"></span>
    <span>Updated <span id="refreshAge"></span></span>
  </div>
  <button class="refresh-btn" id="refreshBtn"><span class="refresh-icon">&#x21bb;</span><span class="spinner"></span> Refresh</button>
  <button class="export-btn" id="exportBtn">Export Executive Summary</button>
</div>

<!-- ===== Active Work ===== -->
<div class="section" id="activeSection">
  <div class="section-title">Active Work <span class="count" id="activeCount">0</span></div>
  <div class="filter-chips" id="filterChips"></div>
  <div class="table-wrap">
    <table>
      <thead id="activeHead"></thead>
      <tbody id="activeBody"></tbody>
    </table>
  </div>
  <div class="empty-state" id="activeEmpty" style="display:none">No matching defects found.</div>
</div>

<!-- ===== Backlog ===== -->
<div class="section" id="backlogSection">
  <div class="section-title">Backlog <span class="count" id="backlogCount">0</span></div>
  <div class="table-wrap">
    <table>
      <thead id="backlogHead"></thead>
      <tbody id="backlogBody"></tbody>
    </table>
  </div>
  <div class="empty-state" id="backlogEmpty" style="display:none">No backlog defects.</div>
</div>

<!-- ===== Export Modal ===== -->
<div class="modal-overlay" id="exportModal">
  <div class="modal">
    <h2>Executive Summary Export</h2>
    <p>This will generate a downloadable HTML slide deck with charts, metrics, and top aged defects.</p>
    <div class="slide-preview" id="slidePreview"></div>
    <div class="modal-actions">
      <button class="modal-btn secondary" id="cancelExport">Cancel</button>
      <button class="modal-btn primary" id="confirmExport">Download Slide Deck</button>
    </div>
  </div>
</div>

nText":"Hey folks,Thales from AML is starting to build the monitorings on their end. Does anyone know in which dataset he can find the information regarding the payment we processed this week?#private-channel","bucket":"Post Alpha Release"},{"key":"MRC-3383","url":"https://nubank.atlassian.net/browse/MRC-3383","summary":"Duplicated $0 transactions","priority":"Medium","status":"Done","statusCategory":"Done","created":"2025-12-19T09:47:56.842-0300","updated":"2026-01-07T15:56:15.396-0300","assignee":"Tiago Matos","reporter":"Tiago Matos","reportedBy":"Tiago Matos","urgency":null,"descriptionText":"Folks, yesterday we did a transaction and it resulted in 3 transactions in pumbaa, we expected 2 transactions $0 and $5, we would like to confirm if it's an expected result.Other questions: Is this difference between merchant names normal?• $0 69445954-bb05-4fba-8c63-176123638cf6 Amazon• $0 69445844-7505-46ea-a630-056ffab2370a AMAZON.COM• $5 69445853-117a-4d39-a47c-419c14e17b65 AMAZON RETAIL#private-channel","bucket":"Post Alpha Release"},{"key":"MRC-3381","url":"https://nubank.atlassian.net/browse/MRC-3381","summary":"Error in T-HUB view","priority":"Medium","status":"Done","statusCategory":"Done","created":"2025-12-19T09:32:29.404-0300","updated":"2025-12-23T13:02:11.788-0300","assignee":"Danilo Gropelo","reporter":"Tiago Matos","reportedBy":"Tiago Matos","urgency":null,"descriptionText":"When trying to retrieve the view from the dash, an error occurs in the adaptation section. This isn't impacting the app, but it's a case where the issue is possibly not being mapped in the adapter.```nu-us-prod ser curl GET s0 endurance \"/api/customers/6914c8c8-a044-49ac-800b-0ec0dc692a09/views/credit-card-dashboard/query\" --data '{    \"product_key\": \"credit-card\",    \"customer_product_id\": \"6914ccbb-83d8-4bc7-9cf7-eb02e928c24f\"}' | jq``````\"errors\": {    \"unknown\": [      {        \"transaction_id\": \"6915f4f4-7b78-4a13-aae1-c462d70e4c7d\",        \"timestamp\": \"2025-11-13T15:10:39\",        \"view_item_name\": \"credit_card_dashboard\",        \"transaction_type\": \"credit_card_mastercard_authorization_only\",        \"error_message\": \"Value does not match schema: {:original-description (not (instance? java.lang.String nil))}\"      }    ]  }```#private-channel","bucket":"Post Alpha Release"},{"key":"MRC-3380","url":"https://nubank.atlassian.net/browse/MRC-3380","summary":"Cooled down auth and fraud services causing timeouts","priority":"Medium","status":"Canceled","statusCategory":"Done","created":"2025-12-19T08:33:29.280-0300","updated":"2026-04-27T13:12:49.456-0300","assignee":"Unassigned","reporter":"Rodrigo Knolseisen","reportedBy":"Rodrigo Knolseisen","urgency":null,"descriptionText":"Whenever we're running transactions (authorizations) in production, some services appear to time-out the response which is affecting our tests.There are 2 services that have showed a slow-down that generated time-out responses in this week, although we have an hypothesis that other services may be slower than expected as well.Service: Dione\nerror presented on lost-boy:lost-boy.controllers.card/get-card-by-id-via-card-provider-serviceCID to check:pied-piper.19S.CREDIT.DMS.22GSService: Stadium\nerror presented on lost-boy: \"error-checking-for-fraud\" CID to check:pied-piper.19S.CREDIT.DMS.GU5PA.YHS2I.3TZBQ","bucket":"Post Alpha Release"},{"key":"MRC-3357","url":"https://nubank.atlassian.net/browse/MRC-3357","summary":"US no longer listed as option","priority":"Medium","status":"Done","statusCategory":"Done","created":"2025-12-17T10:37:52.843-0300","updated":"2025-12-19T14:57:55.079-0300","assignee":"Vitoria Previato","reporter":"Rafael Jauregui","reportedBy":"Rafael Jauregui","urgency":null,"descriptionText":"I logged out of the US account to use my MX account. After realizing I could not sign into the MX account, I tried re-logging into the US account but the option was no longer there.#private-channel","bucket":"Post Alpha Release"},{"key":"MRC-3347","url":"https://nubank.atlassian.net/browse/MRC-3347","summary":"[Internal Payments Lead's Reports CC <> GBA]","priority":"High","status":"Done","statusCategory":"Done","created":"2025-12-15T19:39:26.612-0300","updated":"2026-01-08T14:00:53.517-0300","assignee":"Jacqueline Ponce","reporter":"Jacqueline Ponce","reportedBy":"Jacqueline Ponce","urgency":null,"descriptionText":"Hi folks, we have a issue on the integration about internal-transfers on GBA reports.Context: Is missing an integration on the GBA reports acknowledging that the payment of the bill were by internal-transfer, i.e., the money leaves the deposit account, but we are not correlating this money to the CC payment on Lead's reports. This has an implication on Reconciliation flow.Solution: we are confirming with Lead if they need the internal-transfer-id fill:• if GBA reports need a internal-transfer-id:    ◦ we need to do a discovery on how to implement    ◦ it's possible to have a manual solution until we implement the final one.• if GBA reports don't need a internal-transfer-id:    ◦ we will build the fix tomorrow and test in SandboxImpacts:• CC tested one internal payment last week, but GBA had other bugs on the reports, that's why didn't break• CC made a new internal payment today, is expected:    ◦ CC reports run successfully    ◦ GBA reports break Next Steps:• Waiting for Lead's answers until tomorrow morning and define the best approach. Please keep me honest here @caiofauzacc: @Vitoria @melazo @ugo#private-channel","bucket":"Post Alpha Release"},{"key":"MRC-3184","url":"https://nubank.atlassian.net/browse/MRC-3184","summary":"Can't access virtual credit card info","priority":"Medium","status":"Done","statusCategory":"Done","created":"2025-12-09T18:58:49.111-0300","updated":"2025-12-10T10:11:38.106-0300","assignee":"Unassigned","reporter":"Lia Tiemy","reportedBy":"Lia Tiemy","urgency":null,"descriptionText":"Hey all, I'm having trouble to access the information about my virtual credit card. In the video says it needs to check myself with facial recognition, but it doesn't continue and it can redirect me to the chat, which I understood we don't have one yet, so I'm reporting it here.#private-channel","bucket":"Post Alpha Release"},{"key":"MRC-3176","url":"https://nubank.atlassian.net/browse/MRC-3176","summary":"Missing Compensation : Interchange Fee","priority":"Low","status":"Done","statusCategory":"Done","created":"2025-12-08T22:38:59.321-0300","updated":"2025-12-12T12:57:31.737-0300","assignee":"Lucas Viotti","reporter":"Dharmesh Chheda","reportedBy":"Dharmesh Chheda","urgency":null,"descriptionText":"Compensation for the interchange is missing from the Lead side. Ongoing conversation with Lead.Thread","bucket":"Post Alpha Release"},{"key":"MRC-3175","url":"https://nubank.atlassian.net/browse/MRC-3175","summary":"Ledger Discrepancy: Accounting Movement","priority":"Low","status":"Done","statusCategory":"Done","created":"2025-12-08T22:34:51.668-0300","updated":"2025-12-15T15:10:19.541-0300","assignee":"Lucas Viotti","reporter":"Dharmesh Chheda","reportedBy":"Dharmesh Chheda","urgency":null,"descriptionText":"Ledger Discrepancy: Identified an accounting movement issue where events were sent but are not correctly reflected in the ledgers. DA team investigating the issue. (thread)","bucket":"Post Alpha Release"},{"key":"MRC-3162","url":"https://nubank.atlassian.net/browse/MRC-3162","summary":"Fix staging bills not closed from previous dates","priority":"Medium","status":"Done","statusCategory":"Done","created":"2025-12-05T16:58:06.102-0300","updated":"2025-12-22T15:43:18.715-0300","assignee":"Vitoria Previato","reporter":"Vitoria Previato","reportedBy":"Vitoria Previato","urgency":null,"descriptionText":"From this thread. In summary, bills did not close in staging due to the lack of automated jobs. The only reason we need to fix this is because we have Lead reported customers in staging sandbox, and we should attempt making their state consistent ot having access to the cards info flow anymore (he had access previously), and seeing a required facial identity confirmation which leads him to a customer chat, as per shown in the recording attached. He's not able to recover from that flow, as the chat feature doesnt exist and other errors popup.#private-channel","bucket":"Post Alpha Release"},{"key":"MRC-3146","url":"https://nubank.atlassian.net/browse/MRC-3146","summary":"CC tester stuck after inputting wrong SSN/ITIN","priority":"Medium","status":"Canceled","statusCategory":"Done","created":"2025-12-02T17:10:58.958-0300","updated":"2025-12-09T21:42:18.117-0300","assignee":"Unassigned","reporter":"Vitoria Previato","reportedBy":"Vitoria Previato","urgency":null,"descriptionText":"We had a new tester today, but after going through the flow until Lobby, he did not get approved for CC. After investigating, we understood that the approval didn't happen because the SSN/ITIN inputted did not match the rollout.Talking to NM folks, we understood this is a known issue that also happened with a GBA tester, and that is pending until now waiting for a new endpoint to fix it on Registry Platform. Going back on the flow and adding the correct data doesn't fix it (and possibly makes it worse).This issue is being created so we can discuss extra side-effects and track when we can fix and unblock this customer, as well as bring awareness for new testers on this input step.#private-channel","bucket":"Post Alpha Release"},{"key":"MRC-3142","url":"https://nubank.atlassian.net/browse/MRC-3142","summary":"PDF not generated after bill closing","priority":"Medium","status":"Done","statusCategory":"Done","created":"2025-12-01T11:33:13.422-0300","updated":"2025-12-02T08:44:22.926-0300","assignee":"Danilo Gropelo","reporter":"Danilo Gropelo","reportedBy":"Danilo Gropelo","urgency":null,"descriptionText":"After the bill closing and cycle renewal we were expecting to have a PDF generated automatically for bills with transactions, but it didn't happen.https://backoffice.ist.nubank.world/atlas/#/atlas/alexandria?account=us&cid=job-renew-billing-cycle&earliest=1764547200&latest=1764633599&prototype=s0&services=bora-bill%2Ckill-bill%2Cduckbill%2Cpuzzle%2Cpostmaster%2Cnotification%2Cnurender (Atlas with current investigation)We are investigating the issue, apparently there is a configuration error related to the S3 bucket name where the PDFs should be stored.Once we fix the configuration we have to figure it out how to re-trigger the PDF generation.#private-channel","bucket":"Post Alpha Release"},{"key":"MRC-3136","url":"https://nubank.atlassian.net/browse/MRC-3136","summary":"Bills not being automatically closed in Prod","priority":"High","status":"Done","statusCategory":"Done","created":"2025-12-01T09:52:04.785-0300","updated":"2025-12-03T14:40:45.354-0300","assignee":"Tiago Matos","reporter":"Vitoria Previato","reportedBy":"Vitoria Previato","urgency":null,"descriptionText":"Today we were supposed to be having our first 3 bills closing in Prod, but apparently Tempo didn't proceed with the schedule/call of the job.We're taking a deeper look into it, but we already plan to run the job manually to close the bills still today.#private-channel","bucket":"Post Alpha Release"},{"key":"MRC-3135","url":"https://nubank.atlassian.net/browse/MRC-3135","summary":"What are the contracts/datasets that I can find account__id and transaction__id ?","priority":"Medium","status":"Done","statusCategory":"Done","created":"2025-11-28T11:17:24.452-0300","updated":"2025-12-07T16:27:17.406-0300","assignee":"Unassigned","reporter":"Giovanna Perez","reportedBy":"Giovanna Perez","urgency":null,"descriptionText":"Hey folks,@fabretti is starting to put together the fraud monirtoings and is asking where he can find the information, contracts/datasets, about custoemrs and transactions.@vitao not sure if you already wants to direct him to golden sources#private-channel","bucket":"Post Alpha Release"},{"key":"MRC-3127","url":"https://nubank.atlassian.net/browse/MRC-3127","summary":"Bill close without transactions generating unexpected sife effects","priority":"Medium","status":"Done","statusCategory":"Done","created":"2025-11-26T14:13:44.928-0300","updated":"2025-12-05T16:56:36.005-0300","assignee":"Vitoria Previato","reporter":"Vitoria Previato","reportedBy":"Vitoria Previato","urgency":null,"descriptionText":"From staging tests, we realized that a customer without any transactions on the bill falls in scenario we might be missing some handlings.The example we have is with customer-id 69041d1a-1e69-44e3-860d-db4dcac80fd0, with a bill that closed today (due-date was manually edited, but I don't think it's relevant) - https://staging-backoffice.ist.nubank.world/atlas/#/atlas/alexandria?account=us&cid=job-renew-billing-cycle&earliest=1764115200&latest=1764201599&prototype=s0%2Cglobal&services=bora-bill%2Ckill-bill%2Cfiado%2Cjigsaw%2Cpuzzle%2Cpostmaster%2Caperture%2Cendurance%2Cnotification%2Cduckbill%2Cbill%2Cemmet%2Cnurender (Atlas from the Test)In short:• fiado returns a 422 exception, due to: credit-not-found• emmet raises a 502 exception.• kill-bill marks the task simulate-charge-credit-items as failedBesides that, the cycle was closed and a new one was created in bora-bill. But duckbill returns a 404 when trying to fetch the latest bill, and we believe it's because fiado is not creating charges for when there are no credits.Since this will happen in Prod next Monday Dec 1 for 2 of our Alpha testers, we should understand the needed changes and prioritize to avoid having them in inconsistent states.#private-channel","bucket":"Post Alpha Release"},{"key":"MRC-3016","url":"https://nubank.atlassian.net/browse/MRC-3016","summary":"Document Production Evidences for Alpha Testers","priority":"Medium","status":"Canceled","statusCategory":"Done","created":"2025-11-18T16:36:58.485-0300","updated":"2025-12-22T15:43:34.868-0300","assignee":"Vitoria Previato","reporter":"Dharmesh Chheda","reportedBy":"Dharme statusCategory":"Done","created":"2026-05-21T11:11:28.065-0300","updated":"2026-05-29T16:26:27.372-0300","assignee":"Tiago Matos","reporter":"Tiago Matos","reportedBy":"Tiago Matos","urgency":null,"descriptionText":"Related thread: https://nubank.slack.com/archives/C099YKBP7GC/p1779368765210029","bucket":"Beta Staging"},{"key":"MRC-5893","url":"https://nubank.atlassian.net/browse/MRC-5893","summary":"Revolving MST - Mismatch found due to trailing interest behavior","priority":"High","status":"Done","statusCategory":"Done","created":"2026-05-21T08:37:01.470-0300","updated":"2026-06-22T13:53:14.002-0300","assignee":"Felipe Dalosto","reporter":"Jacqueline Ponce","reportedBy":"Jacqueline Ponce","urgency":null,"descriptionText":"Context: While validating the Revolving 3B narrative in MST, we found a discrepancy starting from the 3rd billing cycle. The root cause appears to be how trailing interest is handled after a full statement payment.Specifically: when a customer pays the full statement balance, a small residual of interest continues to accrue between the cycle close date and the payment date. This trailing interest then gets charged at the next cycle close — which is not currently reflected consistently across the DA MST and CCF scenario calculations and ee were not able to find a formal decision record defining the expected behavior for this scenario.","bucket":"Beta Staging"},{"key":"MRC-5871","url":"https://nubank.atlassian.net/browse/MRC-5871","summary":"Annual interest rate is hardcoded as 18.2","priority":"High","status":"Done","statusCategory":"Done","created":"2026-05-19T17:54:04.873-0300","updated":"2026-05-28T16:18:44.205-0300","assignee":"Tiago Matos","reporter":"Tiago Matos","reportedBy":"Tiago Matos","urgency":null,"descriptionText":"We are aligning this issue in this thread: https://nubank.slack.com/archives/C0B27PM7MBP/p1779224237816529","bucket":"Beta Staging"},{"key":"MRC-5870","url":"https://nubank.atlassian.net/browse/MRC-5870","summary":"Standin let activeBucket = "All";

// Status category mapping
const STATUS_MAP = {};
for (const [cat, statuses] of Object.entries(CONFIG.statusCategories)) {
  for (const s of statuses) STATUS_MAP[s.toLowerCase()] = cat;
}

function statusCategory(statusName) {
  return STATUS_MAP[statusName.toLowerCase()] || "backlog";
}

const PRIORITY_RANK = {};
CONFIG.priorityOrder.forEach((p, i) => PRIORITY_RANK[p] = i);
function priorityRank(p) { return PRIORITY_RANK[p] ?? 99; }

// ===========================================================================
// Filtering
// ===========================================================================
function getFilteredIssues() {
  let issues = ALL_ISSUES;

  // Bucket filter
  if (activeBucket !== "All") {
    issues = issues.filter(i => i.bucket === activeBucket);
  }

  // Search
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    issues = issues.filter(i =>
      i.key.toLowerCase().includes(q) ||
      i.summary.toLowerCase().includes(q) ||
      i.assignee.toLowerCase().includes(q) ||
      i.reportedBy.toLowerCase().includes(q)
    );
  }

  return issues;
}

function isBacklog(issue) {
  return statusCategory(issue.status) === "backlog";
}

const STATUS_LABEL_MAP = {
  inProgress: "In Progress",
  blocked: "Blocked",
  inValidation: "In Validation",
  done: "Done"
};
const FILTER_CAT_MAP = {
  "In Progress": "inProgress",
  "Blocked": "blocked",
  "In Validation": "inValidation",
  "Done": "done"
};

function getActiveIssues(issues) {
  const nonBacklog = issues.filter(i => !isBacklog(i));
  return nonBacklog.filter(i => {
    const cat = statusCategory(i.status);
    const label = STATUS_LABEL_MAP[cat] || cat;
    return activeFilters.has(label);
  });
}

function getBacklogIssues(issues) {
  return issues.filter(i => isBacklog(i));
}

// ===========================================================================
// Sorting
// ===========================================================================
function sortIssues(issues, col, dir) {
  const copy = [...issues];
  copy.sort((a, b) => {
    let cmp = 0;
    switch (col) {
      case "priority":
        cmp = priorityRank(a.priority) - priorityRank(b.priority);
        break;
      case "key":
        const aNum = parseInt(a.key.split("-")[1]) || 0;
        const bNum = parseInt(b.key.split("-")[1]) || 0;
        cmp = aNum - bNum;
        break;
      case "summary":
        cmp = a.summary.localeCompare(b.summary);
        break;
      case "reportedBy":
        cmp = a.reportedBy.localeCompare(b.reportedBy);
        break;
      case "created":
        cmp = new Date(a.created) - new Date(b.created);
        break;
      case "status":
        cmp = a.status.localeCompare(b.status);
        break;
      case "assignee":
        cmp = a.assignee.localeCompare(b.assignee);
        break;
      default:
        cmp = 0;
    }
    // Secondary sort: priority asc, then created desc
    if (cmp === 0 && col !== "priority") cmp = priorityRank(a.priority) - priorityRank(b.priority);
    if (cmp === 0 && col !== "created") cmp = new Date(b.created) - new Date(a.created);
    return dir === "desc" ? -cmp : cmp;
  });
  return copy;
}

function formatDate(iso) {
  if (!iso) return "—";
  const d = new Date(iso);
  return d.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
}

function priorityBadgeClass(p) {
  return "badge badge-priority-" + p.toLowerCase();
}

function statusBadgeClass(status) {
  const cat = statusCategory(status);
  const classMap = {
    backlog: "badge-status-backlog",
    inProgress: "badge-status-inprogress",
    blocked: "badge-status-blocked",
    inValidation: "badge-status-invalidation",
    done: "badge-status-done"
  };
  return "badge " + (classMap[cat] || "badge-status-backlog");
}

function escapeHtml(str) {
  if (!str) return "";
  return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function renderTableHead(containerId) {
  const cols = [
    { key: "priority", label: "Priority" },
    { key: "key", label: "Ticket" },
    { key: "summary", label: "Summary" },
    { key: "reportedBy", label: "Reported By" },
    { key: "created", label: "Reported On" },
    { key: "status", label: "Status" },
    { key: "assignee", label: "Assigned To" },
  ];
  const thead = document.getElementById(containerId);
  thead.innerHTML = "<tr>" + cols.map(c => {
    const arrow = sortCol === c.key ? (sortDir === "asc" ? "▲" : "▼") : "";
    return `<th data-col="${c.key}">${c.label}<span class="sort-arrow">${arrow}</span></th>`;
  }).join("") + "</tr>";

  thead.querySelectorAll("th").forEach(th => {
    th.addEventListener("click", () => {
      const col = th.dataset.col;
      if (sortCol === col) {
        sortDir = sortDir === "asc" ? "desc" : "asc";
      } else {
        sortCol = col;
        sortDir = col === "created" ? "desc" : "asc";
      }
      render();
    });
  });
}

function renderTableBody(containerId, issues, emptyId) {
  const tbody = document.getElementById(containerId);
  const emptyEl = document.getElementById(emptyId);

  if (issues.length === 0) {
    tbody.innerHTML = "";
    emptyEl.style.display = "block";
    tbody.parentElement.style.display = "none";
    return;
  }

  emptyEl.style.display = "none";
  tbody.parentElement.style.display = "";

  tbody.innerHTML = issues.map(i => {
    const urgencyBadge = i.urgency ? `<span class="badge badge-urgency">${escapeHtml(i.urgency)}</span>` : "";
    const tooltipText = i.descriptionText ? escapeHtml(i.descriptionText.substring(0, 300)) : "";
    const summaryCell = tooltipText
      ? `<td class="summary-col"><span class="tooltip-wrap"><span class="summary-text">${escapeHtml(i.summary)}${urgencyBadge}</span><span class="tooltip-content">${tooltipText}</span></span></td>`
      : `<td class="summary-col">${escapeHtml(i.summary)}${urgencyBadge}</td>`;

    return `<tr>
      <td><span class="${priorityBadgeClass(i.priority)}">${escapeHtml(i.priority)}</span></td>
      <td class="key-col"><a href="${escapeHtml(i.url)}" target="_blank" rel="noopener">${escapeHtml(i.key)}</a></td>
      ${summaryCell}
      <td>${escapeHtml(i.reportedBy)}</td>
      <td>${formatDate(i.created)}</td>
      <td><span class="${statusBadgeClass(i.status)}">${escapeHtml(i.status)}</span></td>
      <td>${escapeHtml(i.assignee)}</td>
    </tr>`;
  }).join("");
}

function renderStats(issues) {
  const total = issues.length;
  const counts = { backlog: 0, inProgress: 0, blocked: 0, inValidation: 0, done: 0 };
  issues.forEach(i => {
    const cat = statusCategory(i.status);
    if (counts[cat] !== undefined) counts[cat]++;
    else counts.backlog++;
  });

  const bar = document.getElementById("statsBar");
  bar.innerHTML = `
    <div class="stat-card total"><div class="stat-value">${total}</div><div class="stat-label">Total</div></div>
    <div class="stat-card backlog"><div class="stat-value">${counts.backlog}</div><div class="stat-label">Backlog</div></div>
    <div class="stat-card in-progress"><div class="stat-value">${counts.inProgress}</div><div class="stat-label">In Progress</div></div>
    <div class="stat-card blocked"><div class="stat-value">${counts.blocked}</div><div class="stat-label">Blocked</div></div>
    <div class="stat-card in-validation"><div class="stat-value">${counts.inValidation}</div><div class="stat-label">In Validation</div></div>
    <div class="stat-card done"><div class="stat-value">${counts.done}</div><div class="stat-label">Done</div></div>
  `;
}

function renderBucketTabs() {
  const tabs = document.getElementById("bucketTabs");
  const buckets = ["All", ...CONFIG.epics.map(e => e.label)];
  tabs.innerHTML = buckets.map(b => {
    const count = b === "All" ? ALL_ISSUES.length : ALL_ISSUES.filter(i => i.bucket === b).length;
    const cls = b === activeBucket ? "bucket-tab active" : "bucket-tab";
    return `<button class="${cls}" data-bucket="${b}">${b}<span class="badge">${count}</span></button>`;
  }).join("");

  tabs.querySelectorAll(".bucket-tab").forEach(btn => {
    btn.addEventListener("click", () => {
      activeBucket = btn.dataset.bucket;
      render();
    });
  });
}

function renderFilterChips(issues) {
  const nonBacklog = issues.filter(i => !isBacklog(i));
  const counts = {};
  nonBacklog.forEach(i => {
    const cat = statusCategory(i.status);
    const label = STATUS_LABEL_MAP[cat] || cat;
    counts[label] = (counts[label] || 0) + 1;
  });

  const chips = document.getElementById("filterChips");
  const filterLabels = ["In Progress", "Blocked", "In Validation", "Done"];
  chips.innerHTML = filterLabels.map(label => {
    const cnt = counts[label] || 0;
    const cls = activeFilters.has(label) ? "chip active" : "chip";
    return `<button class="${cls}" data-filter="${label}">${label}<span class="chip-count">(${cnt})</span></button>`;
  }).join("");

  chips.querySelectorAll(".chip").forEach(btn => {
    btn.addEventListener("click", () => {
      const f = btn.dataset.filter;
      if (activeFilters.has(f)) activeFilters.delete(f);
      else activeFilters.add(f);
      render();
    });
  });
}

function render() {
  const filtered = getFilteredIssues();

  renderStats(filtered);
  renderBucketTabs();
  renderFilterChips(filtered);

  const active = sortIssues(getActiveIssues(filtered), sortCol, sortDir);
  const backlog = sortIssues(getBacklogIssues(filtered), sortCol, sortDir);

  document.getElementById("activeCount").textContent = active.length;
  document.getElementById("backlogCount").textContent = backlog.length;

  renderTableHead("activeHead");
  renderTableHead("backlogHead");
  renderTableBody("activeBody", active, "activeEmpty");
  renderTableBody("backlogBody", backlog, "backlogEmpty");
}

function buildExecData() {
  const now = new Date();
  const bucketStats = {};
  const statusCounts = { backlog: 0, inProgress: 0, blocked: 0, inValidation: 0, done: 0 };
  const priorityCounts = {};
  CONFIG.priorityOrder.forEach(p => priorityCounts[p] = 0);

  ALL_ISSUES.forEach(i => {
    const cat = statusCategory(i.status);
    if (statusCounts[cat] !== undefined) statusCounts[cat]++;

    const p = i.priority;
    if (priorityCounts[p] !== undefined) priorityCounts[p]++;
    else priorityCounts[p] = (priorityCounts[p] || 0) + 1;

    if (!bucketStats[i.bucket]) bucketStats[i.bucket] = { total: 0, backlog: 0, inProgress: 0, blocked: 0, inValidation: 0, done: 0 };
    bucketStats[i.bucket].total++;
    if (bucketStats[i.bucket][cat] !== undefined) bucketStats[i.bucket][cat]++;
  });

  // Top 10 aged open defects
  const openIssues = ALL_ISSUES.filter(i => statusCategory(i.status) !== "done");
  openIssues.sort((a, b) => new Date(a.created) - new Date(b.created));
  const top10 = openIssues.slice(0, 10).map(i => ({
    key: i.key,
    summary: i.summary.substring(0, 60),
    priority: i.priority,
    status: i.status,
    ageDays: Math.floor((now - new Date(i.created)) / 86400000),
    bucket: i.bucket
  }));

  const total = ALL_ISSUES.length;
  const resolutionRate = total > 0 ? ((statusCounts.done / total) * 100).toFixed(1) : "0";
  const openAges = openIssues.map(i => Math.floor((now - new Date(i.created)) / 86400000));
  const avgAge = openAges.length > 0 ? (openAges.reduce((a,b) => a+b, 0) / openAges.length).toFixed(0) : "0";

  return { statusCounts, priorityCounts, bucketStats, top10, total, resolutionRate, avgAge, blocked: statusCounts.blocked };
}

function downloadSlideDeck() {
  const d = buildExecData();
  const dateStr = new Date().toLocaleDateString("en-US", { year: "numeric", month: "long", day: "numeric" });

  // Build bar chart SVG for status
  function statusBarChart() {
    const cats = [
      { label: "Backlog", value: d.statusCounts.backlog, color: "#9e9e9e" },
      { label: "In Progress", value: d.statusCounts.inProgress, color: "#1565c0" },
      { label: "Blocked", value: d.statusCounts.blocked, color: "#c62828" },
      { label: "In Validation", value: d.statusCounts.inValidation, color: "#f57c00" },
      { label: "Done", value: d.statusCounts.done, color: "#2e7d32" },
    ];
    const maxVal = Math.max(...cats.map(c => c.value), 1);
    const barW = 80, gap = 20, chartH = 200;
    const totalW = cats.length * (barW + gap);
    let svg = `<svg width="${totalW}" height="${chartH + 50}" xmlns="http://www.w3.org/2000/svg">`;
    cats.forEach((c, i) => {
      const x = i * (barW + gap);
      const h = (c.value / maxVal) * chartH;
      const y = chartH - h;
      svg += `<rect x="${x}" y="${y}" width="${barW}" height="${h}" fill="${c.color}" rx="4"/>`;
      svg += `<text x="${x + barW/2}" y="${y - 6}" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">${c.value}</text>`;
      svg += `<text x="${x + barW/2}" y="${chartH + 20}" text-anchor="middle" font-size="11" fill="#666">${c.label}</text>`;
    });
    svg += "</svg>";
    return svg;
  }

  // Build priority bar chart
  function priorityBarChart() {
    const colors = { Highest: "#c62828", High: "#e65100", Medium: "#f57f17", Low: "#1565c0", Lowest: "#757575" };
    const maxVal = Math.max(...CONFIG.priorityOrder.map(p => d.priorityCounts[p]), 1);
    const barW = 80, gap = 20, chartH = 200;
    const totalW = CONFIG.priorityOrder.length * (barW + gap);
    let svg = `<svg width="${totalW}" height="${chartH + 50}" xmlns="http://www.w3.org/2000/svg">`;
    CONFIG.priorityOrder.forEach((p, i) => {
      const x = i * (barW + gap);
      const v = d.priorityCounts[p];
      const h = (v / maxVal) * chartH;
      const y = chartH - h;
      svg += `<rect x="${x}" y="${y}" width="${barW}" height="${h}" fill="${colors[p] || '#999'}" rx="4"/>`;
      svg += `<text x="${x + barW/2}" y="${y - 6}" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">${v}</text>`;
      svg += `<text x="${x + barW/2}" y="${chartH + 20}" text-anchor="middle" font-size="11" fill="#666">${p}</text>`;
    });
    svg += "</svg>";
    return svg;
  }

  const slideHtml = `<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CC Release Defect Report — Executive Summary</title>
<style>
  @media print { .slide { page-break-after: always; } }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #e0e0e0; margin: 0; padding: 20px; }

  .slide .date { font-size: 16px; color: #888; }

  .slide th { background: #f5f5f5; padding: 8px 12px; text-align: left; border-bottom: 2px solid #ddd; font-size: 11px; text-transform: uppercase; }
  .slide td { padding: 8px 12px; border-bottom: 1px solid #eee; }
  .chart-container { display: flex; justify-content: center; margin-top: 32px; }

<div class="slide">
  <h2>Bucket Health</h2>
  <div class="bucket-row">
    ${Object.entries(d.bucketStats).map(([name, s]) => `
      <div class="bucket-card">

        <div class="metric"><span>In Progress</span><strong>${s.inProgress}</strong></div>
        <div class="metric"><span>Blocked</span><strong style="color:#c62828">${s.blocked}</strong></div>
        <div class="metric"><span>In Validation</span><strong>${s.inValidation}</strong></div>
        <div class="metric"><span>Done</span><strong style="color:#2e7d32">${s.done}</strong></div>
        <div class="metric" style="margin-top:8px;border-top:1px solid #eee;padding-top:8px"><span>Resolution Rate</span><strong>${s.total > 0 ? ((s.done/s.total)*100).toFixed(0) : 0}%</strong></div>
      </div>
    `).join("")}
  </div>
  <div class="slide-num">5</div>

<div class="slide">
  <h2>Key Metrics</h2>
  <div class="metric-cards">
    <div class="metric-card green"><div class="value">${d.resolutionRate}%</div><div class="label">Resolution Rate</div></div>
    <div class="metric-card blue"><div class="value">${d.avgAge}d</div><div class="label">Avg Open Age</div></div>
    <div class="metric-card red"><div class="value">${d.blocked}</div><div class="label">Currently Blocked</div></div>
    <div class="metric-card purple"><div class="value">${d.total - d.statusCounts.done}</div><div class="label">Open Defects</div></div>
  </div>
  <div class="slide-num">6</div>
</div>

</body></html>`;

  // Download
  const blob = new Blob([slideHtml], { type: "text/html" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "cc-defect-executive-summary.html";
  a.click();
  URL.revokeObjectURL(url);
}

// Refresh
// ===========================================================================
function isLocalServe() {
  return location.hostname === "localhost" || location.hostname === "127.0.0.1";
}

function timeAgo(dateStr) {
  const seconds = Math.floor((Date.now() - new Date(dateStr).getTime()) / 1000);
  if (seconds < 60) return "just now";
  const minutes = Math.floor(seconds / 60);
  if (minutes < 60) return minutes + "m ago";
  const hours = Math.floor(minutes / 60);
  if (hours < 24) return hours + "h ago";
  const days = Math.floor(hours / 24);
  return days + "d ago";
}

document.getElementById("refreshAge").textContent = timeAgo(GENERATED_AT);
setInterval(() => {
  document.getElementById("refreshAge").textContent = timeAgo(GENERATED_AT);
}, 60000);

document.getElementById("refreshBtn").addEventListener("click", async () => {
  const btn = document.getElementById("refreshBtn");
  btn.disabled = true;
  btn.classList.add("loading");

  try {
    if (isLocalServe()) {
      // Local --serve mode: hit the local API directly
      const res = await fetch("/api/refresh", { method: "POST" });
      if (!res.ok) {
        const data = await res.json().catch(() => ({}));
        throw new Error(data.error || "Refresh failed (" + res.status + ")");
      }
      window.location.reload();
      return;
    }

    // GitHub Pages: check if newer data is available and reload
    // Data auto-refreshes every 5 min via GitHub Actions
    const res = await fetch(location.href, { cache: "no-store" });
    const html = await res.text();
    const match = html.match(/const GENERATED_AT = "([^"]+)"/);

    if (match && match[1] !== GENERATED_AT) {
      // Newer version available — reload
      window.location.reload();
    } else {
      alert("Data is already up to date (last refreshed " + timeAgo(GENERATED_AT) + ").\nData auto-refreshes every 5 minutes via the backend.");
      btn.disabled = false;
      btn.classList.remove("loading");
    }
  } catch (err) {
    alert("Refresh error: " + err.message);
    btn.disabled = false;
    btn.classList.remove("loading");
  }
});

// ===========================================================================
// Init
// ===========================================================================
document.getElementById("refreshedAt").textContent = new Date(GENERATED_AT).toLocaleString();
render();
</script>
